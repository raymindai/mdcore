name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-engine:
    name: Test Rust Engine
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/engine/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('packages/engine/Cargo.lock') }}

      - name: Run tests
        working-directory: packages/engine
        run: cargo test

  build-wasm:
    name: Build WASM
    runs-on: ubuntu-latest
    needs: test-engine
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/engine/target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('packages/engine/Cargo.lock') }}

      - name: Build WASM
        working-directory: packages/engine
        run: wasm-pack build --target bundler --out-dir ../../apps/web/src/lib/wasm --release

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm-bindings
          path: apps/web/src/lib/wasm/

  build-web:
    name: Build Web App
    runs-on: ubuntu-latest
    needs: build-wasm
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Download WASM artifact
        uses: actions/download-artifact@v4
        with:
          name: wasm-bindings
          path: apps/web/src/lib/wasm/

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci

      - name: Build
        working-directory: apps/web
        run: npm run build

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: apps/web/.next/
