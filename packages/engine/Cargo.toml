[package]
name = "mdcore-engine"
version = "0.1.0"
edition = "2021"
description = "The universal Markdown engine for the AI era"
license = "MIT"
repository = "https://github.com/raymindai/mdcore"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
comrak = { version = "0.36", default-features = false }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
wasm-bindgen = "0.2"
serde-wasm-bindgen = "0.6"

[features]
default = []

[package.metadata.wasm-pack.profile.release]
wasm-opt = false

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
strip = true
panic = "abort"
