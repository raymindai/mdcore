<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;">
  <title>mdfy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
      background: #09090b;
      color: #fafafa;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .titlebar {
      height: 52px;
      flex-shrink: 0;
      -webkit-app-region: drag;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 20px;
    }

    .titlebar-link {
      -webkit-app-region: no-drag;
      font-size: 11px;
      color: #3f3f46;
      cursor: pointer;
      padding: 4px 10px;
      border-radius: 5px;
      border: none;
      background: none;
      font-family: inherit;
      transition: color 0.15s;
    }
    .titlebar-link:hover { color: #a1a1aa; }

    .main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      overflow: hidden;
    }

    /* Both panels: center content vertically */
    .panel {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 40px 48px;
      overflow-y: auto;
    }
    .panel::-webkit-scrollbar { width: 5px; }
    .panel::-webkit-scrollbar-thumb { background: #27272a; border-radius: 3px; }

    .panel-right { border-left: 1px solid #18181b; }

    /* Hero */
    .hero-logo { height: 32px; user-select: none; margin-bottom: 10px; }
    .hero-logo img { height: 100%; width: auto; }
    .hero-tagline { font-size: 13px; color: #737373; margin-bottom: 32px; }

    /* Actions */
    .actions { display: flex; flex-direction: column; gap: 6px; margin-bottom: 36px; }

    .action-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border: 1px solid #1e1e22;
      border-radius: 10px;
      background: transparent;
      color: #fafafa;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
      text-align: left;
      width: 100%;
    }
    .action-btn:hover { background: #18181b; border-color: #27272a; }
    .action-btn:active { transform: scale(0.995); }

    .action-icon {
      width: 30px; height: 30px;
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .ic-new { background: rgba(251, 146, 60, 0.1); color: #fb923c; }
    .ic-open { background: rgba(96, 165, 250, 0.1); color: #60a5fa; }
    .ic-import { background: rgba(74, 222, 128, 0.1); color: #4ade80; }
    .ic-paste { background: rgba(167, 139, 250, 0.1); color: #a78bfa; }

    .action-text { flex: 1; }
    .action-text small { display: block; font-size: 11px; font-weight: 400; color: #3f3f46; margin-top: 1px; }
    .action-kbd { font-family: "SF Mono", ui-monospace, monospace; font-size: 10px; color: #27272a; }

    /* Section label */
    .section-label { font-size: 10px; font-weight: 600; color: #3f3f46; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 12px; }

    /* Example cards - 2 col grid */
    .example-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .example-card {
      padding: 14px 16px;
      border: 1px solid #1e1e22;
      border-radius: 10px;
      background: transparent;
      color: inherit;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
      text-align: left;
      width: 100%;
      position: relative;
      overflow: hidden;
      min-height: 68px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .example-card:hover { background: #18181b; border-color: #27272a; }

    .example-card .card-accent {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .example-card:hover .card-accent { opacity: 1; }

    .example-card .card-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.3px;
      margin-bottom: 4px;
    }
    .example-card .card-name {
      font-size: 12px;
      font-weight: 500;
      color: #a1a1aa;
      line-height: 1.4;
    }
    .example-card:hover .card-name { color: #d4d4d8; }

    .c-ai .card-label { color: #fb923c; }
    .c-ai .card-accent { background: #fb923c; }
    .c-code .card-label { color: #4ade80; }
    .c-code .card-accent { background: #4ade80; }
    .c-math .card-label { color: #c4b5fd; }
    .c-math .card-accent { background: #c4b5fd; }
    .c-diag .card-label { color: #f472b6; }
    .c-diag .card-accent { background: #f472b6; }
    .c-tbl .card-label { color: #60a5fa; }
    .c-tbl .card-accent { background: #60a5fa; }
    .c-import .card-label { color: #fbbf24; }
    .c-import .card-accent { background: #fbbf24; }

    /* Full-width last card when odd count */
    .example-card.full-width { grid-column: 1 / -1; }

    /* Right panel content */
    .right-content {
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    /* Recent */
    .recent-list { display: flex; flex-direction: column; gap: 1px; }

    .recent-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px; border-radius: 7px; border: none;
      background: transparent; color: inherit; font-family: inherit;
      font-size: 12px; cursor: pointer; transition: background 0.12s;
      text-align: left; width: 100%;
    }
    .recent-item:hover { background: #18181b; }

    .recent-icon { color: #27272a; flex-shrink: 0; }
    .recent-item:hover .recent-icon { color: #3f3f46; }
    .recent-info { flex: 1; min-width: 0; }
    .recent-name { color: #71717a; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .recent-item:hover .recent-name { color: #fafafa; }
    .recent-dir { font-size: 10px; color: #27272a; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-top: 1px; }
    .recent-time { font-size: 10px; color: #27272a; flex-shrink: 0; }

    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 32px;
      border: 1px dashed #1e1e22;
      border-radius: 14px;
      gap: 12px;
    }

    .empty-visual {
      width: 48px; height: 48px;
      border-radius: 12px;
      background: #18181b;
      display: flex; align-items: center; justify-content: center;
      color: #27272a;
    }

    .empty-text { font-size: 12px; color: #3f3f46; line-height: 1.6; }
    .empty-text strong { color: #737373; font-weight: 500; }

    /* Drop zone */
    .dropzone {
      padding: 20px; border: 1px dashed #27272a; border-radius: 10px;
      text-align: center; font-size: 11px; color: #737373; transition: all 0.15s;
    }
    .dropzone.active { border-color: #fb923c; background: rgba(251, 146, 60, 0.03); color: #fb923c; }
    .dropzone-sub { font-family: "SF Mono", ui-monospace, monospace; font-size: 9px; margin-top: 3px; color: #3f3f46; }

    /* Footer */
    .footer {
      flex-shrink: 0; padding: 10px 48px;
      display: flex; justify-content: space-between; align-items: center;
      border-top: 1px solid #18181b; font-size: 10px; color: #27272a;
    }
    .footer-shortcuts { display: flex; gap: 12px; }
    .footer kbd {
      padding: 1px 4px; background: #18181b; border-radius: 3px;
      font-family: "SF Mono", ui-monospace, monospace; font-size: 9px;
      color: #3f3f46; margin-right: 2px;
    }

    /* Theme toggles */
    .logo-light { display: none; }
    .logo-dark { display: block; }

    @media (prefers-color-scheme: light) {
      body { background: #faf9f7; }
      .logo-dark { display: none; }
      .logo-light { display: block; }
      .titlebar-link { color: #a1a1aa; }
      .titlebar-link:hover { color: #71717a; }
      .hero-tagline { color: #a1a1aa; }
      .action-btn { border-color: #e4e4e7; color: #09090b; }
      .action-btn:hover { background: #f4f4f5; border-color: #d4d4d8; }
      .action-text small { color: #a1a1aa; }
      .action-kbd { color: #d4d4d8; }
      .ic-new { background: rgba(234, 88, 12, 0.08); color: #ea580c; }
      .section-label { color: #a1a1aa; }
      .example-card { border-color: #e4e4e7; }
      .example-card:hover { background: #f4f4f5; border-color: #d4d4d8; }
      .example-card .card-name { color: #71717a; }
      .example-card:hover .card-name { color: #3f3f46; }
      .panel-right { border-left-color: #e4e4e7; }
      .recent-item:hover { background: #f4f4f5; }
      .recent-name { color: #a1a1aa; }
      .recent-item:hover .recent-name { color: #09090b; }
      .recent-icon { color: #d4d4d8; }
      .recent-dir, .recent-time { color: #d4d4d8; }
      .empty-state { border-color: #e4e4e7; }
      .empty-visual { background: #f4f4f5; color: #d4d4d8; }
      .empty-text { color: #a1a1aa; }
      .empty-text strong { color: #71717a; }
      .dropzone { border-color: #d4d4d8; color: #a1a1aa; }
      .dropzone-sub { color: #a1a1aa; }
      .footer { border-top-color: #e4e4e7; color: #d4d4d8; }
      .footer kbd { background: #f4f4f5; color: #a1a1aa; }
    }
  </style>
</head>
<body>
  <div class="titlebar">
    <button class="titlebar-link" id="btn-signin">Sign in</button>
  </div>

  <div class="main">
    <!-- Left -->
    <div class="panel">
      <div>
        <div class="hero-logo">
          <img src="logo-dark.svg" alt="mdfy.app" class="logo-dark">
          <img src="logo-light.svg" alt="mdfy.app" class="logo-light">
        </div>
        <p class="hero-tagline">Your Markdown, Beautifully Published.</p>

        <div class="actions">
          <button class="action-btn" id="btn-new">
            <div class="action-icon ic-new"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="8" y1="3" x2="8" y2="13"/><line x1="3" y1="8" x2="13" y2="8"/></svg></div>
            <span class="action-text">New Document<small>Blank editor</small></span>
            <span class="action-kbd">&#8984;N</span>
          </button>
          <button class="action-btn" id="btn-open">
            <div class="action-icon ic-open"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M2 5h5l1.5-2H14v9H2z"/></svg></div>
            <span class="action-text">Open / Import<small>md, pdf, docx, pptx, xlsx, html, csv, json</small></span>
            <span class="action-kbd">&#8984;O</span>
          </button>
          <button class="action-btn" id="btn-paste">
            <div class="action-icon ic-paste"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="4" width="10" height="10" rx="1.5"/><path d="M6 4V2.5A.5.5 0 016.5 2h3a.5.5 0 01.5.5V4"/></svg></div>
            <span class="action-text">Paste from Clipboard<small>AI output, code, or any text</small></span>
            <span class="action-kbd">&#8984;V</span>
          </button>
        </div>

        <div class="section-label">Try an example</div>
        <div class="example-grid">
          <button class="example-card c-ai" data-example="ai-cleanup">
            <div class="card-accent"></div>
            <div class="card-label">AI Conversation</div>
            <div class="card-name">Clean up and format AI chat output</div>
          </button>
          <button class="example-card c-code" data-example="code-docs">
            <div class="card-accent"></div>
            <div class="card-label">Code + Syntax</div>
            <div class="card-name">API docs with highlighted code blocks</div>
          </button>
          <button class="example-card c-math" data-example="math">
            <div class="card-accent"></div>
            <div class="card-label">LaTeX Math</div>
            <div class="card-name">Equations rendered with KaTeX</div>
          </button>
          <button class="example-card c-tbl" data-example="table">
            <div class="card-accent"></div>
            <div class="card-label">Tables + Checklists</div>
            <div class="card-name">Formatted data with GFM task lists</div>
          </button>
        </div>
      </div>
    </div>

    <!-- Right -->
    <div class="panel panel-right">
      <div class="right-content">

        <!-- Cloud documents (shown when logged in) -->
        <div id="cloud-section" style="display:none">
          <div class="section-label">My MDs</div>
          <div id="cloud-list" class="recent-list"></div>
        </div>

        <!-- Local recent files -->
        <div>
          <div class="section-label" id="recent-label">Recent</div>
          <div id="recent-list">
            <div class="empty-state">
              <div class="empty-visual">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
                  <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
                  <polyline points="14,2 14,8 20,8"/>
                  <line x1="16" y1="13" x2="8" y2="13"/>
                  <line x1="16" y1="17" x2="8" y2="17"/>
                  <polyline points="10,9 9,9 8,9"/>
                </svg>
              </div>
              <div class="empty-text">
                <strong>No recent files</strong><br>
                Documents you open will appear here.
              </div>
            </div>
          </div>
        </div>

        <div class="dropzone" id="dropzone">
          Drop files to open
          <div class="dropzone-sub">md, txt, pdf, docx, pptx, xlsx, html, csv, json</div>
        </div>
      </div>
    </div>
  </div>

  <div class="footer">
    <div class="footer-shortcuts">
      <span><kbd>&#8984;N</kbd> New</span>
      <span><kbd>&#8984;O</kbd> Open</span>
      <span><kbd>&#8984;&#8679;H</kbd> Home</span>
      <span style="margin-left:auto;opacity:0.5">
        <a href="https://mdfy.app" style="color:inherit;text-decoration:none" target="_blank">mdfy.app</a>
      </span>
    </div>
    <span id="version-text">v1.0.0</span>
  </div>

  <script>
    document.getElementById("btn-new").addEventListener("click", function() { window.mdfyDesktop.openEditor(); });
    document.getElementById("btn-open").addEventListener("click", function() { window.mdfyDesktop.openFile(); });
    document.getElementById("btn-paste").addEventListener("click", function() {
      window.mdfyDesktop.readClipboard().then(function(text) {
        if (text && text.trim()) {
          window.mdfyDesktop.openEditorWithContent(text, "Pasted.md");
        } else {
          window.mdfyDesktop.openEditor();
        }
      });
    });
    document.getElementById("btn-signin").addEventListener("click", function() {
      window.mdfyDesktop.signIn();
    });

    var EXAMPLES = {
"ai-cleanup": "# How to Build a REST API\n\n> **User:** How do I build a REST API in Node.js?\n\n## Overview\n\nBuilding a REST API in Node.js typically involves:\n\n1. **Express.js** as the web framework\n2. A database (PostgreSQL, MongoDB, etc.)\n3. Proper error handling and validation\n\n## Quick Setup\n\n```bash\nmkdir my-api && cd my-api\nnpm init -y\nnpm install express cors dotenv\n```\n\n## Basic Server\n\n```javascript\nconst express = require('express');\nconst app = express();\n\napp.use(express.json());\n\napp.get('/api/users', (req, res) => {\n  res.json({ users: [] });\n});\n\napp.listen(3000, () => {\n  console.log('Server running on port 3000');\n});\n```\n\n> **Key takeaway:** Start simple, add complexity as needed.",

"code-docs": "# mdfy render pipeline\n\nThe markdown-it pipeline shared across the editor's Live tab and every public viewer.\n\n## Usage\n\n```typescript\nimport { render } from '@/lib/render';\n\nconst { html, title, flavor } = render('# Hello World');\nconsole.log(html);\n```\n\n## What it does\n\n| Step | What |\n|------|------|\n| Parse | `markdown-it` + `markdown-it-footnote`, thead/tbody nooped to match TipTap's table model |\n| Highlight | `highlight.js` on fenced code blocks |\n| Math | KaTeX widgets for `$..$` (inline) and `$$..$$` (display) |\n| Mermaid | left as `<pre lang=\"mermaid\">`, consumer renders via `mermaid.js` |\n| Tables | wrapped in `.table-wrapper` for horizontal scroll |\n| Images | alt-text alignment markers, `<figure>` wrap for captions |\n\n## Why one pipeline\n\nThe editor's Live tab is TipTap, which drives its own markdown-it under the hood. Every non-editing viewer (`/d`, `/b`, `/hub`, `/embed`, VS Code preview, desktop preview) calls the same `render()` function. Same DOM. No \"looks different here\" bugs.",

"math": "# Calculus Notes\n\n## The Fundamental Theorem\n\nIf $f$ is continuous on $[a, b]$ and $F$ is an antiderivative of $f$:\n\n$$\\int_a^b f(x)\\,dx = F(b) - F(a)$$\n\n## Integration by Parts\n\n$$\\int u\\,dv = uv - \\int v\\,du$$\n\n**Example:** $\\int x e^x\\,dx = e^x(x - 1) + C$\n\n## Taylor Series\n\n$$f(x) = \\sum_{n=0}^{\\infty} \\frac{f^{(n)}(a)}{n!}(x-a)^n$$\n\n- $e^x = \\sum \\frac{x^n}{n!}$\n- $\\sin x = \\sum \\frac{(-1)^n x^{2n+1}}{(2n+1)!}$",

"diagram": "# System Architecture\n\n```mermaid\ngraph LR\n  Client[Browser] --> CDN[Vercel CDN]\n  CDN --> Next[Next.js]\n  Next --> Render[markdown-it]\n  Next --> API[REST API]\n  API --> DB[(PostgreSQL)]\n```\n\n```mermaid\nflowchart TD\n  A[Markdown] --> B[markdown-it]\n  B --> C[Raw HTML]\n  C --> D{Post-Process}\n  D --> E[highlight.js]\n  D --> F[KaTeX]\n  D --> G[Mermaid]\n  E & F & G --> H[Output]\n```\n\n| Layer | Tech | Purpose |\n|-------|------|----------|\n| Render | markdown-it | Parsing + HTML |\n| Editor | TipTap (ProseMirror) | WYSIWYG live editing |\n| App | Next.js 15 | Web |\n| DB | Supabase | Storage |",

"import-guide": "# Import & Export Guide\n\n## Import\n\nDrop any file onto mdfy or click **Import File** on the dashboard.\n\n### Supported Formats\n\n| Format | Extension | How |\n|--------|----------|------|\n| Markdown | .md, .markdown, .txt | Direct open |\n| PDF | .pdf | Extracted text |\n| Word | .docx | Converted to MD |\n| PowerPoint | .pptx | Slide text extraction |\n| Excel | .xlsx | Converted to MD tables |\n| HTML | .html | Turndown conversion |\n| CSV | .csv | Auto table formatting |\n| JSON | .json | Pretty-printed code block |\n\n## Export\n\n- **Share URL** — One-click publish to mdfy.app\n- **PDF** — Print-optimized export\n- **Copy** — Rich text for Docs/Email, mrkdwn for Slack\n- **Download** — Save as .md file",

"table": "# Q1 2026 Metrics\n\n| Month | Users | Growth | Revenue |\n|-------|------:|-------:|--------:|\n| Jan | 12,450 | - | $2,490 |\n| Feb | 18,200 | +46% | $4,550 |\n| Mar | 31,800 | +75% | $9,540 |\n\n## Feature Usage\n\n| Feature | Daily | % Total |\n|---------|------:|--------:|\n| Render | 28,400 | 89% |\n| Code | 19,200 | 60% |\n| Math | 8,100 | 26% |\n| Diagrams | 6,300 | 20% |\n| PDF Export | 11,500 | 36% |\n| Share URL | 15,600 | 49% |\n\n- [x] Growth exceeding projections\n- [x] Share driving viral adoption\n- [ ] Pro conversion needs work\n- [ ] Mobile optimization needed"
    };

    document.querySelectorAll(".example-card").forEach(function(btn) {
      btn.addEventListener("click", function() {
        var key = btn.dataset.example;
        if (EXAMPLES[key]) window.mdfyDesktop.openEditorWithContent(EXAMPLES[key], key + ".md");
      });
    });

    var SUPPORTED_EXTS = [".md",".markdown",".mdown",".mkd",".pdf",".docx",".pptx",".xlsx",".html",".csv",".json",".txt"];
    var dropzone = document.getElementById("dropzone");
    document.addEventListener("dragover", function(e) { e.preventDefault(); dropzone.classList.add("active"); });
    document.addEventListener("dragleave", function(e) { if (!e.relatedTarget || e.relatedTarget === document.documentElement) dropzone.classList.remove("active"); });
    document.addEventListener("drop", function(e) {
      e.preventDefault(); dropzone.classList.remove("active");
      var files = Array.from(e.dataTransfer.files).filter(function(f) {
        var d = f.name.lastIndexOf("."); return d >= 0 && SUPPORTED_EXTS.indexOf(f.name.substring(d).toLowerCase()) !== -1;
      });
      if (files.length > 0) window.mdfyDesktop.openFilePath(files[0].path);
    });

    window.mdfyDesktop.getRecentFiles().then(function(files) {
      if (!files || files.length === 0) return;
      var list = document.getElementById("recent-list");
      list.innerHTML = "";
      files.forEach(function(file) {
        var item = document.createElement("button");
        item.className = "recent-item";
        var name = file.path.split("/").pop();
        var dir = file.path.replace(/\/[^/]+$/, "").replace(/^\/Users\/[^/]+/, "~");
        item.innerHTML =
          '<svg class="recent-icon" width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M4 1h8a1 1 0 011 1v12a1 1 0 01-1 1H4a1 1 0 01-1-1V2a1 1 0 011-1z"/><path d="M6 5h4M6 8h4M6 11h2" stroke-linecap="round"/></svg>' +
          '<div class="recent-info"><div class="recent-name">' + name + '</div><div class="recent-dir">' + dir + '</div></div>' +
          '<span class="recent-time">' + timeAgo(file.openedAt) + '</span>';
        item.addEventListener("click", function() {
          console.log("[dashboard] opening recent:", file.path);
          window.mdfyDesktop.openFilePath(file.path).then(function() {
            console.log("[dashboard] openFilePath resolved");
          }).catch(function(err) {
            console.error("[dashboard] openFilePath error:", err);
          });
        });
        list.appendChild(item);
      });
    });

    function timeAgo(ts) {
      var d = Date.now() - new Date(ts).getTime(), m = Math.floor(d/60000);
      if (m < 1) return "Now"; if (m < 60) return m + "m";
      var h = Math.floor(m/60); if (h < 24) return h + "h";
      var dy = Math.floor(h/24); if (dy < 7) return dy + "d";
      return new Date(ts).toLocaleDateString("en-US", { month: "short", day: "numeric" });
    }

    window.mdfyDesktop.getVersion().then(function(v) { document.getElementById("version-text").textContent = "v" + v; }).catch(function(){});

    // ─── Cloud documents ───

    function renderCloudDoc(doc) {
      var item = document.createElement("button");
      item.className = "recent-item";
      var title = doc.title || "Untitled";
      var date = doc.updated_at ? timeAgo(doc.updated_at) : "";
      item.innerHTML =
        '<svg class="recent-icon" width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.2"><circle cx="8" cy="8" r="6"/><path d="M8 4v4l2.5 1.5" stroke-linecap="round"/></svg>' +
        '<div class="recent-info"><div class="recent-name">' + title + '</div><div class="recent-dir">mdfy.app/' + doc.id + '</div></div>' +
        '<span class="recent-time">' + date + '</span>';
      item.addEventListener("click", function() {
        window.mdfyDesktop.openCloudDocument(doc.id);
      });
      return item;
    }

    window.mdfyDesktop.getUser().then(function(user) {
      if (!user) return;

      // Update sign-in button to show user
      var signBtn = document.getElementById("btn-signin");
      signBtn.textContent = user.email || "Signed in";
      signBtn.onclick = function() {
        window.mdfyDesktop.signOut();
        signBtn.textContent = "Sign in";
        document.getElementById("cloud-section").style.display = "none";
        document.getElementById("recent-label").textContent = "Recent";
      };

      // Rename local recent label
      document.getElementById("recent-label").textContent = "Local Files";

      // Fetch cloud documents
      window.mdfyDesktop.getCloudDocuments().then(function(data) {
        var docs = data.documents || [];
        var cloudSection = document.getElementById("cloud-section");
        var cloudList = document.getElementById("cloud-list");

        if (docs.length > 0) {
          cloudSection.style.display = "block";
          cloudList.innerHTML = "";
          docs.slice(0, 10).forEach(function(doc) {
            cloudList.appendChild(renderCloudDoc(doc));
          });
        }
      }).catch(function(){});
    }).catch(function(){});
  </script>
</body>
</html>
