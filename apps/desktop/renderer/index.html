<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mdfy</title>

  <!-- Syntax Highlighting -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark.min.css" id="hljs-theme-dark">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github.min.css" id="hljs-theme-light" disabled>

  <!-- KaTeX Math -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.40/katex.min.css">

  <!-- App Styles -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- ─── Title Bar (macOS hiddenInset) ─── -->
  <div id="titlebar">
    <div class="titlebar-drag"></div>
    <div class="titlebar-content">
      <span class="titlebar-logo"><span class="logo-md">md</span><span class="logo-fy">fy</span></span>
      <span class="titlebar-filename" id="titlebar-filename">Untitled</span>
      <span class="titlebar-modified" id="titlebar-modified"></span>
    </div>
    <div class="titlebar-actions">
      <button id="btn-share" class="titlebar-btn" title="Share to mdfy.cc (Cmd+Shift+P)">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 12V14H12V12"/>
          <path d="M8 2V10"/>
          <path d="M5 5L8 2L11 5"/>
        </svg>
        <span>Share</span>
      </button>
      <button id="btn-source-toggle" class="titlebar-btn" title="Toggle source view (Cmd+/)">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round">
          <path d="M4 3.5L1.5 6L4 8.5M12 3.5l2.5 2.5L12 8.5M9 2l-2 12"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- ─── Toolbar ─── -->
  <div id="toolbar">
    <button data-action="bold" title="Bold (Cmd+B)"><span style="font-weight:700;font-size:12px">B</span></button>
    <button data-action="italic" title="Italic (Cmd+I)"><span style="font-style:italic;font-size:12px">I</span></button>
    <button data-action="strikethrough" title="Strikethrough"><span style="text-decoration:line-through;font-size:12px">S</span></button>
    <span class="toolbar-divider"></span>
    <button data-action="h1" title="Heading 1"><span style="font-size:10px;font-weight:700">H1</span></button>
    <button data-action="h2" title="Heading 2"><span style="font-size:10px;font-weight:700">H2</span></button>
    <button data-action="h3" title="Heading 3"><span style="font-size:10px;font-weight:600">H3</span></button>
    <span class="toolbar-divider"></span>
    <button data-action="ul" title="Bullet list">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><circle cx="3" cy="4" r="1"/><circle cx="3" cy="8" r="1"/><circle cx="3" cy="12" r="1"/><rect x="6" y="3" width="8" height="2" rx="0.5"/><rect x="6" y="7" width="8" height="2" rx="0.5"/><rect x="6" y="11" width="8" height="2" rx="0.5"/></svg>
    </button>
    <button data-action="ol" title="Numbered list">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><text x="1" y="5" font-size="4.5" font-weight="700">1</text><text x="1" y="9" font-size="4.5" font-weight="700">2</text><text x="1" y="13" font-size="4.5" font-weight="700">3</text><rect x="6" y="3" width="8" height="2" rx="0.5"/><rect x="6" y="7" width="8" height="2" rx="0.5"/><rect x="6" y="11" width="8" height="2" rx="0.5"/></svg>
    </button>
    <button data-action="task" title="Task list">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3"><rect x="2" y="2" width="5" height="5" rx="1"/><path d="M3.5 4.5l1 1 2-2" stroke-linecap="round"/><rect x="2" y="9" width="5" height="5" rx="1"/><rect x="9" y="3" width="5" height="2" rx="0.5" fill="currentColor"/><rect x="9" y="10" width="5" height="2" rx="0.5" fill="currentColor"/></svg>
    </button>
    <span class="toolbar-divider"></span>
    <button data-action="indent" title="Indent">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M3 4h10M7 8h6M7 12h6M3 7l2 1.5L3 10"/></svg>
    </button>
    <button data-action="outdent" title="Outdent">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M3 4h10M7 8h6M7 12h6M5 7l-2 1.5L5 10"/></svg>
    </button>
    <span class="toolbar-divider"></span>
    <button data-action="blockquote" title="Blockquote">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M3 3h4v4H5.5L4 10H3V3zm6 0h4v4h-1.5L10 10H9V3z"/></svg>
    </button>
    <button data-action="hr" title="Horizontal rule">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="2" y1="8" x2="14" y2="8"/></svg>
    </button>
    <span class="toolbar-divider"></span>
    <button data-action="link" title="Link (Cmd+K)">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M7 9l2-2"/><rect x="1" y="7" width="5" height="5" rx="1.5" transform="rotate(-45 3.5 9.5)"/><rect x="7" y="1" width="5" height="5" rx="1.5" transform="rotate(-45 9.5 3.5)"/></svg>
    </button>
    <button data-action="image" title="Image">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3"><rect x="2" y="3" width="12" height="10" rx="1.5"/><circle cx="5.5" cy="6.5" r="1.2"/><path d="M2 11l3.5-3 2.5 2 3-2.5L14 11" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <button data-action="table" title="Insert table">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="2" y="2" width="12" height="12" rx="1.5"/><line x1="2" y1="6" x2="14" y2="6"/><line x1="2" y1="10" x2="14" y2="10"/><line x1="6" y1="2" x2="6" y2="14"/><line x1="10" y1="2" x2="10" y2="14"/></svg>
    </button>
    <button data-action="code" title="Inline code"><span style="font-family:monospace;font-size:10px">&lt;/&gt;</span></button>
    <button data-action="codeblock" title="Code block">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"><path d="M5 4L2 8l3 4M11 4l3 4-3 4M9 2l-2 12"/></svg>
    </button>
  </div>

  <!-- ─── Editor Area ─── -->
  <div id="editor-wrapper">
    <!-- Empty State -->
    <div id="empty-state">
      <div class="empty-logo"><span class="logo-md">md</span><span class="logo-fy">fy</span></div>
      <div class="empty-tagline">The fastest way from thought to shared document.</div>
      <div class="empty-actions">
        <button id="empty-new" class="empty-btn primary">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M8 3v10M3 8h10"/></svg>
          New Document
        </button>
        <button id="empty-open" class="empty-btn">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M3 3h4l1.5 2H13v8H3V3z"/></svg>
          Open File
        </button>
      </div>
      <div class="empty-drop">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 3v12M8 11l4 4 4-4"/>
          <path d="M20 17v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2"/>
        </svg>
        <span>Drop a .md file here</span>
      </div>
      <div class="empty-shortcuts">
        <kbd>Cmd+N</kbd> New &nbsp;&nbsp; <kbd>Cmd+O</kbd> Open &nbsp;&nbsp; <kbd>Cmd+S</kbd> Save &nbsp;&nbsp; <kbd>Cmd+Shift+P</kbd> Share
      </div>
    </div>

    <!-- WYSIWYG Content -->
    <article id="content" class="mdcore-rendered" contenteditable="true" style="display:none"></article>

    <!-- Source View -->
    <div id="source-view" style="display:none">
      <textarea id="source-editor" spellcheck="false" placeholder="Write markdown here..."></textarea>
    </div>
  </div>

  <!-- ─── Status Bar ─── -->
  <div id="statusbar">
    <div class="statusbar-left">
      <span id="status-text">Ready</span>
    </div>
    <div class="statusbar-center">
      <button id="flavor-badge" title="Markdown flavor">GFM</button>
    </div>
    <div class="statusbar-right">
      <span id="word-count">0 words</span>
      <span class="statusbar-sep">&middot;</span>
      <span id="char-count">0 chars</span>
    </div>
  </div>

  <!-- ─── Drag Overlay ─── -->
  <div id="drag-overlay" style="display:none">
    <div class="drag-overlay-content">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 3v12M8 11l4 4 4-4"/>
        <path d="M20 17v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2"/>
      </svg>
      <span>Drop to open</span>
    </div>
  </div>

  <!-- ─── Scripts ─── -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.40/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11.13.0/dist/mermaid.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
