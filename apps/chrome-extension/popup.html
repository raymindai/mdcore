<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      background: #09090b;
      color: #fafafa;
      font-family: system-ui, -apple-system, sans-serif;
      padding: 20px;
    }
    .logo {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 16px;
    }
    .logo .md { color: #fb923c; }
    .logo .fy { color: #fafafa; }
    .logo .cc { color: #71717a; }
    .desc {
      font-size: 13px;
      color: #a1a1aa;
      line-height: 1.5;
      margin-bottom: 20px;
    }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 8px;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    .btn-primary {
      background: rgba(251, 146, 60, 0.15);
      color: #fb923c;
    }
    .btn-secondary {
      background: #18181b;
      color: #a1a1aa;
      border: 1px solid #27272a;
    }
    .status {
      font-size: 12px;
      color: #71717a;
      text-align: center;
      margin-top: 12px;
    }
    .status.success { color: #4ade80; }
    .status.error { color: #ef4444; }
  </style>
</head>
<body>
  <div class="logo">
    <span class="md">md</span><span class="fy">fy</span><span class="cc">.cc</span>
  </div>
  <p class="desc">Save the current page or AI conversation as a beautiful Markdown document.</p>

  <button class="btn-primary" id="save-page">Save Page as Markdown</button>
  <button class="btn-secondary" id="save-selection">Save Selection</button>

  <div class="status" id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
