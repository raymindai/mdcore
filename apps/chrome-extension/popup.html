<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Security-Policy" content="script-src 'self'; style-src 'self' 'unsafe-inline'">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 320px;
      background: #0a0a0c;
      color: #e4e4e7;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── Header ─── */
    .header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 16px 16px 12px;
    }

    .logo { height: 16px; }
    .logo img { height: 100%; width: auto; }

    .header-meta { text-align: right; }

    .tagline {
      font-size: 9px;
      color: #a1a1aa;
      font-weight: 500;
    }

    .detection {
      display: flex;
      align-items: center;
      gap: 4px;
      justify-content: flex-end;
      margin-top: 3px;
    }

    .detection-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
    }
    .detection-dot.active { background: #4ade80; }
    .detection-dot.inactive { background: #27272a; }

    .detection-text {
      font-size: 9px;
      color: #71717a;
    }
    .detection-text.active { color: #a1a1aa; }

    .platform-hint { display: none; }

    /* ─── Main ─── */
    .main { padding: 0 16px 14px; }

    /* ─── Capture Card ─── */
    .capture-card {
      border: 1px solid #1c1c20;
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 6px;
    }

    /* ─── Range Radio ─── */
    .range-options {
      display: none;
      flex-wrap: wrap;
      gap: 4px;
      padding: 8px 10px;
      border-bottom: 1px solid #1c1c20;
      background: #0f0f12;
    }

    .range-options label {
      flex: 1;
      min-width: calc(50% - 2px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 5px 0;
      border-radius: 5px;
      font-size: 10px;
      color: #71717a;
      cursor: pointer;
      transition: all 0.1s;
      border: 1px solid transparent;
    }

    .range-options label:hover {
      color: #71717a;
      background: rgba(255,255,255,0.02);
    }

    .range-options input[type="radio"] {
      display: none;
    }

    .range-options input[type="radio"]:checked + span {
      color: #fb923c;
    }

    .range-options label:has(input:checked) {
      border-color: rgba(251, 146, 60, 0.2);
      background: rgba(251, 146, 60, 0.05);
    }

    /* ─── Capture Button ─── */
    .capture-btn {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 11px 12px;
      background: none;
      border: none;
      color: #fb923c;
      font-size: 12px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.1s;
      text-align: left;
    }
    .capture-btn:hover:not(:disabled) { background: rgba(251, 146, 60, 0.06); }
    .capture-btn:active:not(:disabled) { background: rgba(251, 146, 60, 0.1); }
    .capture-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .capture-btn svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      opacity: 0.6;
    }

    .capture-btn .label { flex: 1; }
    .capture-btn .desc {
      display: block;
      font-size: 9px;
      font-weight: 400;
      color: rgba(251, 146, 60, 0.5);
      margin-top: 1px;
    }

    /* ─── Selection Button ─── */
    .selection-card {
      border: 1px solid #1c1c20;
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 6px;
    }

    .selection-btn {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: none;
      border: none;
      color: #a1a1aa;
      font-size: 12px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.1s;
      text-align: left;
    }
    .selection-btn:hover { background: rgba(255,255,255,0.02); }
    .selection-btn:active { background: rgba(255,255,255,0.04); }

    .selection-btn svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      opacity: 0.4;
    }

    .selection-btn .desc {
      display: block;
      font-size: 9px;
      font-weight: 400;
      color: #52525b;
      margin-top: 1px;
    }

    /* ─── Status ─── */
    .status {
      font-size: 10px;
      color: #71717a;
      text-align: center;
      min-height: 12px;
      margin-top: 6px;
      transition: color 0.15s;
    }
    .status.success { color: #4ade80; }
    .status.error { color: #ef4444; }

    /* ─── How it works ─── */
    .how {
      padding: 12px 16px 14px;
      border-top: 1px solid #141416;
    }

    .how-label {
      font-size: 8px;
      font-weight: 700;
      color: #52525b;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 10px;
    }

    .how-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .how-item {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .how-pill {
      display: inline-flex;
      align-items: center;
      height: 20px;
      padding: 0 7px;
      border: 1px solid #1c1c20;
      border-radius: 10px;
      background: #0f0f12;
      font-size: 9px;
      flex-shrink: 0;
    }
    .how-pill .md { color: #fb923c; font-weight: 800; }
    .how-pill .fy { color: #d4d4d8; font-weight: 800; }
    .how-pill .lbl {
      color: #71717a;
      font-weight: 500;
      margin-left: 3px;
      padding-left: 4px;
      border-left: 1px solid #1c1c20;
    }
    .how-pill .arrow { color: #71717a; margin-left: 1px; font-size: 7px; }

    .how-icon {
      width: 20px;
      height: 20px;
      border-radius: 10px;
      background: #0f0f12;
      border: 1px solid #1c1c20;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: #71717a;
      font-size: 10px;
    }

    .how-text {
      font-size: 10px;
      color: #a1a1aa;
      line-height: 1.3;
    }

    /* ─── Footer ─── */
    .footer {
      padding: 8px 16px 10px;
      border-top: 1px solid #18181b;
      display: flex;
      justify-content: space-between;
    }

    .footer a {
      color: #52525b;
      font-size: 10px;
      text-decoration: none;
      transition: color 0.1s;
    }
    .footer a:hover { color: #fb923c; }
  </style>
</head>
<body>
  <div class="header">
    <a class="logo" href="https://mdfy.cc" target="_blank">
      <img src="icons/logo-full-dark.svg" alt="mdfy.cc">
    </a>
    <div class="header-meta">
      <div class="tagline">Your Markdown, Beautifully published</div>
      <div class="detection" id="platform-badge">
        <span class="detection-dot inactive" id="platform-dot"></span>
        <span class="detection-text" id="platform-name">Detecting...</span>
      </div>
    </div>
  </div>
  <span class="platform-hint" id="platform-hint"></span>

  <div class="main">
    <div class="capture-card">
      <div class="range-options" id="range-selector">
        <label><input type="radio" name="range" value="0" checked><span>All</span></label>
        <label><input type="radio" name="range" value="3"><span>Last 3</span></label>
        <label><input type="radio" name="range" value="5"><span>Last 5</span></label>
        <label><input type="radio" name="range" value="10"><span>Last 10</span></label>
      </div>
      <button class="capture-btn" id="btn-capture" disabled>
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <rect x="3" y="3" width="14" height="14" rx="2"/>
          <path d="M7 7h6M7 10h4M7 13h5"/>
        </svg>
        <span class="label">
          Capture Full Conversation
          <span class="desc">All messages → Markdown document</span>
        </span>
      </button>
    </div>

    <div class="selection-card">
      <button class="selection-btn" id="btn-selection">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <path d="M5 3v14M15 3v14M3 5h2M3 15h2M15 5h2M15 15h2"/>
        </svg>
        <span class="label">
          Capture Selection
          <span class="desc">Highlighted text from any page</span>
        </span>
      </button>
    </div>

    <div class="status" id="status"></div>
  </div>

  <div class="how">
    <div class="how-label">How it works</div>
    <div class="how-list">
      <div class="how-item">
        <span class="how-pill"><span class="md">md</span><span class="fy">fy</span><span class="lbl">this</span></span>
        <span class="how-text">Hover any AI response to capture Q&A</span>
      </div>
      <div class="how-item">
        <span class="how-pill"><span class="md">md</span><span class="fy">fy</span><span class="lbl">All</span><span class="arrow">&#9662;</span></span>
        <span class="how-text">Capture full conversation or a range</span>
      </div>
      <div class="how-item">
        <span class="how-icon">→</span>
        <span class="how-text">Published on mdfy.cc with a permanent URL</span>
      </div>
    </div>
  </div>

  <div class="footer">
    <a href="https://mdfy.cc" target="_blank">mdfy.cc</a>
    <a href="https://mdfy.cc/about" target="_blank">About</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
